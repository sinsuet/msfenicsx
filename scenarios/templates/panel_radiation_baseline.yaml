schema_version: "1.0"
template_meta:
  template_id: panel-radiation-baseline
  description: Baseline 2D satellite panel scenario template.
coordinate_system:
  plane: panel_xy
panel_domain:
  width: 1.0
  height: 0.8
placement_regions:
  - region_id: main-deck
    kind: rect
    x_min: 0.05
    x_max: 0.95
    y_min: 0.05
    y_max: 0.75
keep_out_regions:
  - region_id: connector-strip
    kind: rect
    x_min: 0.0
    x_max: 1.0
    y_min: 0.76
    y_max: 0.8
component_families:
  - family_id: avionic-box
    role: payload
    shape: rect
    count_range:
      min: 1
      max: 3
    geometry:
      width:
        min: 0.08
        max: 0.16
      height:
        min: 0.05
        max: 0.1
    material_ref: aluminum
boundary_feature_families:
  - family_id: radiator-edge
    kind: line_sink
    edge: top
    span:
      min: 0.2
      max: 0.85
    sink_temperature:
      min: 275.0
      max: 290.0
    transfer_coefficient:
      min: 8.0
      max: 16.0
load_rules:
  - target_family: avionic-box
    total_power:
      min: 8.0
      max: 22.0
material_rules:
  - material_id: aluminum
    conductivity: 205.0
    emissivity: 0.78
operating_case_profiles: []
mesh_profile:
  nx: 48
  ny: 40
solver_profile:
  nonlinear_solver: snes
  absolute_tolerance: 1.0e-8
  relative_tolerance: 1.0e-8
generation_rules:
  seed_policy: external
  max_placement_attempts: 250
