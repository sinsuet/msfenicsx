schema_version: "1.0"
template_meta:
  template_id: s5_aggressive15
  description: Aggressive single-case 15-component benchmark with wider layout slack, multi-bottleneck thermal loading, and a top sink window sized for primitive-structured raw/union/llm comparison.
coordinate_system:
  plane: panel_xy
