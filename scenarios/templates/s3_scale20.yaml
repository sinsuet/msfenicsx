material_rules:
  - material_id: panel_substrate
    conductivity: 3.0
    emissivity: 0.78
  - material_id: electronics_housing
    conductivity: 12.0
    emissivity: 0.82
physics:
  kind: steady_heat_radiation
  ambient_temperature: 292.0
  background_boundary_cooling:
    transfer_coefficient: 0.04
    emissivity: 0.05
mesh_profile:
