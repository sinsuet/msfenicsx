schema_version: "1.0"
template_meta:
  template_id: s1_typical
  description: Single-case S1 typical paper-facing template with fifteen fixed component families and one top-edge radiator window.
coordinate_system:
  plane: panel_xy
panel_domain:
  width: 1.0
  height: 0.8
placement_regions:
  - region_id: main-deck
    kind: rect
    x_min: 0.05
    x_max: 0.95
    y_min: 0.05
    y_max: 0.72
keep_out_regions:
  - region_id: top-edge-harness-strip
    kind: rect
    x_min: 0.0
    x_max: 1.0
    y_min: 0.74
    y_max: 0.8
component_families:
  - family_id: c01
    role: logic_board_01
    shape: rect
    count_range: {min: 1, max: 1}
    geometry:
      width: {min: 0.11, max: 0.11}
      height: {min: 0.09, max: 0.09}
    material_ref: electronics_housing
    thermal_tags: [payload, logic]
    layout_tags: [logic_board, compute_cluster]
    placement_hint: center_mass
    adjacency_group: compute-cluster
    clearance: 0.012
  - family_id: c02
    role: power_module_01
    shape: rect
    count_range: {min: 1, max: 1}
    geometry:
      width: {min: 0.12, max: 0.12}
      height: {min: 0.09, max: 0.09}
    material_ref: electronics_housing
    thermal_tags: [payload, high_power]
    layout_tags: [power_dense, sink_aware]
    placement_hint: top_band
    adjacency_group: thermal-cluster
    clearance: 0.018
  - family_id: c03
    role: logic_board_02
    shape: rect
    count_range: {min: 1, max: 1}
    geometry:
