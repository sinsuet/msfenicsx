boundary_feature_families:
  - family_id: sink-top-window
    kind: line_sink
    edge: top
    span:
      min: 0.25
      max: 0.75
    sink_temperature:
      min: 286.0
      max: 286.0
    transfer_coefficient:
      min: 10.0
      max: 10.0
load_rules:
  - target_family: c01
    total_power: 12.0
  - target_family: c02
    total_power: 11.0
  - target_family: c03
    total_power: 10.0
  - target_family: c04
    total_power: 9.5
  - target_family: c05
    total_power: 9.0
  - target_family: c06
    total_power: 8.5
  - target_family: c07
    total_power: 8.0
  - target_family: c08
    total_power: 7.5
  - target_family: c09
    total_power: 7.0
  - target_family: c10
    total_power: 6.5
  - target_family: c11
    total_power: 6.0
  - target_family: c12
    total_power: 5.5
  - target_family: c13
    total_power: 5.0
  - target_family: c14
    total_power: 4.5
  - target_family: c15
    total_power: 4.0
material_rules:
  - material_id: panel_substrate
    conductivity: 25.0
    emissivity: 0.78
  - material_id: electronics_housing
    conductivity: 160.0
    emissivity: 0.82
mesh_profile:
  nx: 48
  ny: 40
solver_profile:
  nonlinear_solver: snes
  absolute_tolerance: 1.0e-8
  relative_tolerance: 1.0e-8
  max_iterations: 50
generation_rules:
  seed_policy: external
  max_placement_attempts: 300
