schema_version: "1.0"
template_meta:
  template_id: s1_typical
  description: Single-case S1 typical paper-facing template with fifteen fixed component families and one top-edge radiator window.
coordinate_system:
  plane: panel_xy
panel_domain:
  width: 1.0
  height: 0.8
placement_regions:
