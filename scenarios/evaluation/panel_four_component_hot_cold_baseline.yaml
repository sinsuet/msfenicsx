schema_version: "1.0"
spec_meta:
  spec_id: panel-four-component-hot-cold-baseline
  description: Paper-grade hot/cold multicase evaluation baseline for the four-component benchmark.
operating_cases:
  - operating_case_id: hot
    description: Hot operating case
  - operating_case_id: cold
    description: Cold operating case
objectives:
  - objective_id: minimize_hot_pa_peak
    operating_case: hot
    metric: component.rf_power_amp.temperature_max
    sense: minimize
  - objective_id: maximize_cold_battery_min
    operating_case: cold
    metric: component.battery_pack.temperature_min
    sense: maximize
  - objective_id: minimize_radiator_resource
    operating_case: hot
    metric: case.total_radiator_span
    sense: minimize
constraints:
  - constraint_id: hot_pa_limit
    operating_case: hot
    metric: component.rf_power_amp.temperature_max
    relation: "<="
    limit: 355.0
  - constraint_id: hot_processor_limit
    operating_case: hot
    metric: component.processor.temperature_max
    relation: "<="
    limit: 350.0
  - constraint_id: cold_battery_floor
    operating_case: cold
    metric: component.battery_pack.temperature_min
    relation: ">="
    limit: 268.0
  - constraint_id: hot_component_spread_limit
    operating_case: hot
    metric: components.max_temperature_spread
    relation: "<="
    limit: 20.0
