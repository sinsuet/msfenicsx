schema_version: "1.0"
spec_meta:
  spec_id: panel-hot-cold-multiobjective-baseline
  description: Hot/cold multicase multiobjective thermal evaluation baseline.
operating_cases:
  - operating_case_id: hot
    description: Hot operating condition
  - operating_case_id: cold
    description: Cold operating condition
objectives:
  - objective_id: minimize_hot_peak_temperature
    operating_case: hot
    metric: summary.temperature_max
    sense: minimize
  - objective_id: minimize_cold_radiator_span
    operating_case: cold
    metric: case.total_radiator_span
    sense: minimize
  - objective_id: minimize_hot_component_spread
    operating_case: hot
    metric: components.max_temperature_spread
    sense: minimize
constraints:
  - constraint_id: hot_peak_limit
    operating_case: hot
    metric: summary.temperature_max
    relation: "<="
    limit: 350.0
  - constraint_id: cold_minimum_temperature
    operating_case: cold
    metric: summary.temperature_min
    relation: ">="
    limit: 260.0
