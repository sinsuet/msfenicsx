algorithm:
  family: genetic
  backbone: nsga2
  mode: union
  population_size: 20
  num_generations: 10
  seed: 7
  profile_path: scenarios/optimization/profiles/s5_aggressive15_union.yaml
operator_control:
  controller: llm
  registry_profile: primitive_structured
  operator_pool:
    - vector_sbx_pm
    - component_jitter_1
    - anchored_component_jitter
    - component_relocate_1
    - component_swap_2
    - sink_shift
    - sink_resize
    - component_block_translate_2_4
    - component_subspace_sbx
  controller_parameters:
    provider: openai-compatible
    capability_profile: chat_compatible_json
    performance_profile: balanced
    model_env_var: LLM_MODEL
    api_key_env_var: LLM_API_KEY
    base_url_env_var: LLM_BASE_URL
    max_output_tokens: 512
    selection_strategy: semantic_prior_sampler
    semantic_prior_sampler:
      uniform_mix: 0.15
      min_probability_floor: 0.03
      generation_operator_cap_fraction: 0.35
      rolling_operator_cap_fraction: 0.40
      rolling_semantic_task_cap_fraction: 0.55
      rolling_window: 16
      risk_penalty_weight: 0.50
    temperature: 0.7
    retry:
      max_attempts: 2
      timeout_seconds: 35
    memory:
      recent_window: 16
      reflection_interval: 1
    fallback_controller: random_uniform
evaluation_protocol:
  evaluation_spec_path: scenarios/evaluation/s5_aggressive15_eval.yaml
  legality_policy_id: projection_plus_local_restore
