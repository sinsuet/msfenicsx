algorithm:
  family: genetic
  backbone: nsga2
  mode: union
  population_size: 20
  num_generations: 10
  seed: 7
  profile_path: scenarios/optimization/profiles/s1_typical_union.yaml
operator_control:
  controller: llm
  registry_profile: primitive_clean
  operator_pool:
    - vector_sbx_pm
    - component_jitter_1
    - anchored_component_jitter
    - component_relocate_1
    - component_swap_2
    - sink_shift
    - sink_resize
  controller_parameters:
    provider: openai-compatible
    capability_profile: chat_compatible_json
    performance_profile: balanced
    model_env_var: LLM_MODEL
    api_key_env_var: LLM_API_KEY
    base_url_env_var: LLM_BASE_URL
    max_output_tokens: 512
    selection_strategy: semantic_ranked_pick
    semantic_ranked_pick:
      max_rank_scan: 9
      generation_operator_cap_fraction: 0.35
      rolling_operator_cap_fraction: 0.40
      rolling_semantic_task_cap_fraction: 0.55
      rolling_window: 16
      near_tie_score_margin: 0.03
      low_confidence_threshold: 0.35
    temperature: 1.0
    reasoning:
      effort: medium
    retry:
      max_attempts: 2
      timeout_seconds: 45
    memory:
      recent_window: 32
      reflection_interval: 1
    fallback_controller: random_uniform
evaluation_protocol:
  evaluation_spec_path: scenarios/evaluation/s1_typical_eval.yaml
  legality_policy_id: minimal_canonicalization
