algorithm:
  family: genetic
  backbone: nsga2
  mode: union
  population_size: 20
  num_generations: 10
  seed: 7
  profile_path: scenarios/optimization/profiles/s1_typical_union.yaml
operator_control:
  controller: llm
  operator_pool:
    - native_sbx_pm
    - global_explore
    - local_refine
    - move_hottest_cluster_toward_sink
    - spread_hottest_cluster
    - smooth_high_gradient_band
    - reduce_local_congestion
    - repair_sink_budget
    - slide_sink
    - rebalance_layout
  controller_parameters:
    provider: openai-compatible
    capability_profile: chat_compatible_json
    performance_profile: balanced
    model_env_var: LLM_MODEL
    api_key_env_var: LLM_API_KEY
    base_url_env_var: LLM_BASE_URL
    max_output_tokens: 256
    temperature: 1.0
    reasoning:
      effort: medium
    retry:
      max_attempts: 2
      timeout_seconds: 45
    memory:
      recent_window: 32
      reflection_interval: 1
    fallback_controller: random_uniform
evaluation_protocol:
  evaluation_spec_path: scenarios/evaluation/s1_typical_eval.yaml
