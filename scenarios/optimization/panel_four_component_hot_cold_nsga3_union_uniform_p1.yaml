schema_version: "1.0"
spec_meta:
  spec_id: panel-four-component-hot-cold-nsga3-union-uniform-p1
  description: NSGA-III union-uniform exploratory baseline with native plus shared custom actions.
benchmark_source:
  template_path: scenarios/templates/panel_four_component_hot_cold_benchmark.yaml
  seed: 11
design_variables:
  - variable_id: processor_x
    path: components[0].pose.x
    lower_bound: 0.12
    upper_bound: 0.88
  - variable_id: processor_y
    path: components[0].pose.y
    lower_bound: 0.12
    upper_bound: 0.66
  - variable_id: rf_power_amp_x
    path: components[1].pose.x
    lower_bound: 0.12
    upper_bound: 0.88
  - variable_id: rf_power_amp_y
    path: components[1].pose.y
    lower_bound: 0.12
    upper_bound: 0.66
  - variable_id: battery_pack_x
    path: components[3].pose.x
    lower_bound: 0.12
    upper_bound: 0.88
  - variable_id: battery_pack_y
    path: components[3].pose.y
    lower_bound: 0.12
    upper_bound: 0.66
  - variable_id: radiator_start
    path: boundary_features[0].start
    lower_bound: 0.05
    upper_bound: 0.7
  - variable_id: radiator_end
    path: boundary_features[0].end
    lower_bound: 0.2
    upper_bound: 0.95
algorithm:
  family: genetic
  backbone: nsga3
  mode: union
  population_size: 16
  num_generations: 8
  seed: 7
  profile_path: scenarios/optimization/profiles/panel_four_component_hot_cold_nsga3_union.yaml
operator_control:
  controller: random_uniform
  operator_pool:
    - native_sbx_pm
    - sbx_pm_global
    - local_refine
    - hot_pair_to_sink
    - hot_pair_separate
    - battery_to_warm_zone
    - radiator_align_hot_pair
    - radiator_expand
    - radiator_contract
evaluation_protocol:
  evaluation_spec_path: scenarios/evaluation/panel_four_component_hot_cold_baseline.yaml
