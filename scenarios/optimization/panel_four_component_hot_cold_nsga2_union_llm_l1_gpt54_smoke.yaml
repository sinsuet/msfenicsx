schema_version: "1.0"
spec_meta:
  spec_id: panel-four-component-hot-cold-nsga2-union-llm-l1-gpt54-smoke
  description: NSGA-II hybrid-union L1 smoke profile using an OpenAI-compatible endpoint with GPT-5.4 and a minimal live budget.
benchmark_source:
  template_path: scenarios/templates/panel_four_component_hot_cold_benchmark.yaml
  seed: 11
design_variables:
  - variable_id: processor_x
    path: components[0].pose.x
    lower_bound: 0.12
    upper_bound: 0.88
  - variable_id: processor_y
    path: components[0].pose.y
    lower_bound: 0.12
    upper_bound: 0.66
  - variable_id: rf_power_amp_x
    path: components[1].pose.x
    lower_bound: 0.12
    upper_bound: 0.88
  - variable_id: rf_power_amp_y
    path: components[1].pose.y
    lower_bound: 0.12
    upper_bound: 0.66
  - variable_id: battery_pack_x
    path: components[3].pose.x
    lower_bound: 0.12
    upper_bound: 0.88
  - variable_id: battery_pack_y
    path: components[3].pose.y
    lower_bound: 0.12
    upper_bound: 0.66
  - variable_id: radiator_start
    path: boundary_features[0].start
    lower_bound: 0.05
    upper_bound: 0.7
  - variable_id: radiator_end
    path: boundary_features[0].end
    lower_bound: 0.2
    upper_bound: 0.95
algorithm:
  family: genetic
  backbone: nsga2
  mode: union
  population_size: 4
  num_generations: 2
  seed: 7
  profile_path: scenarios/optimization/profiles/panel_four_component_hot_cold_nsga2_union.yaml
operator_control:
  controller: llm
  operator_pool:
    - native_sbx_pm
    - sbx_pm_global
    - local_refine
    - hot_pair_to_sink
    - hot_pair_separate
    - battery_to_warm_zone
    - radiator_align_hot_pair
    - radiator_expand
    - radiator_contract
  controller_parameters:
    provider: openai-compatible
    capability_profile: chat_compatible_json
    performance_profile: balanced
    model: GPT-5.4
    api_key_env_var: OPENAI_API_KEY
    base_url: https://llmapi.paratera.com/v1
    max_output_tokens: 128
    temperature: 1.0
    retry:
      max_attempts: 2
      timeout_seconds: 45
    memory:
      recent_window: 32
      reflection_interval: 1
    fallback_controller: random_uniform
evaluation_protocol:
  evaluation_spec_path: scenarios/evaluation/panel_four_component_hot_cold_baseline.yaml
