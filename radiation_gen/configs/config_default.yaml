# ==========================================
# 核心模式与全局配置
# ==========================================
simulation_mode: "radiation" 
num_samples: 5            # 生成样本总数
save_root: "/data/zxr/data"       # 保存根目录
mesh_size: [128, 128]        # 网格尺寸 (Ny, Nx)

# ==========================================
# 参数分布配置 (通用格式)
# 支持两种模式:
# 1. 连续值: 根据小数位数截断
# 2. 离散分布: 填写 min, max, step 并设 distribution: "discrete_uniform"
# ==========================================

# 1. 布局域尺寸 [m]
domain_size:
  min: 0.5
  max: 2.0
  step: 0.01
  distribution: "discrete_uniform"

# 2. 材料导热系数 [W/(m·K)]
material_kappa:
  fixed: 1.155

# 3. 发射率 (仅在 radiation 模式生效)
emissivity:
  fixed: 0.9

# 4. 背景温度 [K] (radiation 模式为 T_amb, dirichlet 模式为 T_fixed)
background_temperature:
  min: 260.0
  max: 290.0
  step: 0.5
  distribution: "discrete_uniform"

# ==========================================
# 元件与热源生成约束
# ==========================================
component:
  # 元件数量范围
  num_components_range:
    min: 10               # 起始元件数量
    max: 20               # 结束元件数量
  
  # 形状概率分布
  shapes: ["rect", "circle", "capsule"]
  shape_probs: [0.55, 0.15, 0.3]  # 矩形55%、圆形15%、胶囊30%
  
  # 元件总面积占布局域面积的比例范围 (用于自动匹配布局域)
  area_ratio_range: [0.4, 0.5]
  
  # 布局算法最大尝试次数 (避免元件重叠失败)
  max_sampling_attempts: 500

  # 功率区间配置 (支持多区间权重分配)
  power_ranges:
    - min: 5.0
      max: 20.0
      step: 0.05
      distribution: "uniform"
      weight: 0.9          # 90% 的元件落入此区间
    - min: 30.0
      max: 50.0
      distribution: "uniform" # 只有 uniform 模式下，decimal_precision 才生效执行四舍五入
      weight: 0.1          # 10% 的元件落入此区间
  
  force_power_proportion: True  # 强制按权重比例分配元件功率区间

  # 各形状的尺寸范围 [min, max] (单位：m)
  rect:
    width: [0.05, 0.3]        # 矩形宽度（5~30cm）
    height: [0.05, 0.3]       # 矩形高度（5~30cm）
  circle:
    radius: [0.025, 0.15]     # 圆形半径（2.5~15cm）
  capsule:
    length: [0.15, 0.3]       # 胶囊总长度（15~30cm）
    width: [0.025, 0.1]       # 胶囊宽度（直径）

# ==========================================
# 散热线段参数
# ==========================================
cooling_lines:
  length_ratio: 0.2           # 散热线段长度为布局域边长的比例（如 0.2 = 20%）
  num_lines: 2                # 生成的散热线段数量
  edges: ["bottom", "top", "left", "right"]  # 可选边
  overlap_threshold: 0.001    # 重叠判定阈值 [m]
  max_attempts: 100           # 最大尝试次数

# ==========================================
# 小数精度配置
# ==========================================
decimal_precision:
  background_temperature: 2  # 背景温度 (K) 的小数位数
  material_kappa: 3          # 材料导热系数 (W/mK) 的小数位数
  domain_size: 2             # 仿真域尺寸 (m) 的小数位数
  cooling_line_length: 3     # 散热线段长度 (m) 的小数位数
  component_dimensions: 3    # 元件几何尺寸 (宽、高、半径等) 的小数位数
  # coordinates: 3           # 元件中心坐标的小数位数 (目前由布局器自动处理)
  # power_values: 2          # 元件总功率 (W) 的小数位数
