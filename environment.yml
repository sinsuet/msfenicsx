name: msfenicsx
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.12,<3.13
  # FEniCSx stack (conda-forge only, requires system MPI)
  - fenics-dolfinx>=0.10.0
  - fenics-basix>=0.10.0
  - fenics-ffcx>=0.10.0
  - fenics-ufl>=2025.2.0
  - mpi4py>=4.0
  - petsc4py>=3.21
  # pip-installable dependencies
  - pip
  - pip:
      - -e ".[llm,dev]"
